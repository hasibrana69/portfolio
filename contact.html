  <!-- contact form -->
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 bg-white p-4 shadow-sm rounded">
        <h3 class="text-center mb-4">Contact Us</h3>

        <form id="contactForm">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" id="name" class="form-control" placeholder="Hasib RANA">
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="hasibrana489@gmail.com">
          </div>

          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="tel" id="phone" class="form-control" placeholder="+8801795883259">
          </div>

          <div class="mb-3">
            <label class="form-label">Address</label>
            <input type="text" id="address" class="form-control" placeholder="Mohammadpur">
          </div>

          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea id="message" class="form-control" rows="3"></textarea>
          </div>

          <button type="submit" class="btn btn-primary w-100">Send Message</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('contactForm');

    form.onsubmit = function (event) {
      // Stop the form from refreshing the page
      event.preventDefault();

      // Get values from the inputs
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const address = document.getElementById('address').value;
      const message = document.getElementById('message').value;

      // Simple validation check
      if (name == "" || email == "" || phone == "" || address == "" || message == "") {
        alert("Please fill in all fields!");
      } else {
        alert("Success! Your message has been sent.");
        form.reset(); // Clears the form
      }
    };
  </script>

        <script>
          function updateDateTime() {
            const now = new Date();
            const options = {
              weekday: 'short',
              year: 'numeric',
              month: 'short',
              day: 'numeric',
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
              hour12: true
            };
            document.getElementById('datetime').textContent = now.toLocaleString('en-US', options);
          }

          setInterval(updateDateTime, 1000);
